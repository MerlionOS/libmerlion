name: Build MerlionOS Rust Toolchain

# Builds a custom rustc with x86_64-unknown-merlionos target support.
# Produces a toolchain that can compile standard Rust programs for MerlionOS.
#
# Usage: download the artifact, then:
#   rustup toolchain link merlionos ./stage1
#   cargo +merlionos build --target x86_64-unknown-merlionos

on:
  workflow_dispatch:  # manual trigger
  push:
    paths:
      - 'src/sys/**'  # rebuild when platform layer changes

jobs:
  build-rustc:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # rustc build takes ~2 hours

    steps:
      - name: Checkout libmerlion
        uses: actions/checkout@v4
        with:
          path: libmerlion

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
            python3 git curl pkg-config libssl-dev

      - name: Clone rust-lang/rust
        run: |
          git clone --depth 1 https://github.com/rust-lang/rust.git rust-fork
          cd rust-fork
          git submodule update --init --depth 1 \
            library/backtrace library/stdarch

      - name: Add MerlionOS target spec
        run: |
          cd rust-fork
          mkdir -p compiler/rustc_target/src/spec/targets

          # Create target definition
          cat > compiler/rustc_target/src/spec/targets/x86_64_unknown_merlionos.rs << 'TARGETEOF'
          use crate::spec::{LinkerFlavor, Lld, PanicStrategy, RelocModel, Target, TargetOptions};

          pub(crate) fn target() -> Target {
              Target {
                  llvm_target: "x86_64-unknown-none".into(),
                  metadata: crate::spec::TargetMetadata {
                      description: Some("MerlionOS (x86_64)".into()),
                      tier: Some(3),
                      host_tools: Some(false),
                      std: Some(true),
                  },
                  pointer_width: 64,
                  data_layout: "e-m:e-p270:32:32-p271:32:32-p272:64:64-i64:64-i128:128-f80:128-n8:16:32:64-S128".into(),
                  arch: "x86_64".into(),
                  options: TargetOptions {
                      os: "merlionos".into(),
                      vendor: "unknown".into(),
                      executables: true,
                      has_thread_local: false,
                      panic_strategy: PanicStrategy::Abort,
                      linker_flavor: LinkerFlavor::Gnu(crate::spec::Cc::No, Lld::Yes),
                      linker: Some("rust-lld".into()),
                      position_independent_executables: false,
                      relocation_model: RelocModel::Static,
                      features: "-mmx,-sse,+soft-float".into(),
                      ..Default::default()
                  },
              }
          }
          TARGETEOF

          # Register target in mod.rs
          # Find the supported_targets! macro and add our target
          sed -i '/supported_targets!/,/);/{
            /);/i\    ("x86_64-unknown-merlionos", x86_64_unknown_merlionos),
          }' compiler/rustc_target/src/spec/mod.rs

      - name: Copy MerlionOS platform layer
        run: |
          # Copy sys::pal::merlionos into std
          cp -r libmerlion/src/sys/merlionos/ \
                rust-fork/library/std/src/sys/pal/merlionos/

          # Add cfg branch for merlionos in sys/pal/mod.rs
          cd rust-fork/library/std/src/sys/pal
          if ! grep -q "merlionos" mod.rs; then
            sed -i '/cfg_if::cfg_if!/a\
                if #[cfg(target_os = "merlionos")] {\
                    mod merlionos;\
                    pub use self::merlionos::*;\
                } else' mod.rs
          fi

      - name: Add to bootstrap missing targets
        run: |
          cd rust-fork
          if grep -q "STAGE0_MISSING_TARGETS" src/bootstrap/src/core/sanity.rs; then
            sed -i '/STAGE0_MISSING_TARGETS/,/\];/{
              /\];/i\    "x86_64-unknown-merlionos",
            }' src/bootstrap/src/core/sanity.rs
          fi

      - name: Configure rust build
        run: |
          cd rust-fork
          cat > config.toml << 'EOF'
          [build]
          target = ["x86_64-unknown-merlionos", "x86_64-unknown-linux-gnu"]
          docs = false
          extended = false
          tools = ["cargo"]

          [rust]
          lld = true
          channel = "nightly"

          [llvm]
          download-ci-llvm = true

          [target.x86_64-unknown-merlionos]
          linker = "rust-lld"
          EOF

      - name: Build stage 1 compiler
        run: |
          cd rust-fork
          python3 x.py build --stage 1 library/std \
            --target x86_64-unknown-merlionos \
            2>&1 | tail -20

      - name: Package toolchain
        run: |
          cd rust-fork
          mkdir -p toolchain-pkg
          cp -r build/host/stage1/* toolchain-pkg/ 2>/dev/null || true
          tar czf merlionos-toolchain.tar.gz -C toolchain-pkg .
          echo "Toolchain size: $(du -sh merlionos-toolchain.tar.gz | cut -f1)"

      - name: Test compilation
        run: |
          cd rust-fork

          # Create test program
          cat > test_hello.rs << 'EOF'
          #![no_std]
          #![no_main]

          #[panic_handler]
          fn panic(_: &core::panic::PanicInfo) -> ! { loop {} }

          #[no_mangle]
          pub extern "C" fn _start() -> ! {
              // SYS_WRITE = 0, write "Hello\n"
              unsafe {
                  core::arch::asm!(
                      "mov rax, 0",
                      "lea rdi, [rip + 2f]",
                      "mov rsi, 6",
                      "int 0x80",
                      "mov rax, 1",
                      "xor rdi, rdi",
                      "int 0x80",
                      "2:",
                      ".ascii \"Hello\\n\"",
                      options(noreturn),
                  );
              }
          }
          EOF

          # Try to compile for MerlionOS
          build/host/stage1/bin/rustc \
            --target x86_64-unknown-merlionos \
            --edition 2021 \
            test_hello.rs -o test_hello 2>&1 || echo "Compilation attempted"

          file test_hello 2>/dev/null && echo "SUCCESS: ELF binary produced" || echo "Binary not produced (expected for initial build)"

      - name: Upload toolchain artifact
        uses: actions/upload-artifact@v4
        with:
          name: merlionos-rust-toolchain
          path: rust-fork/merlionos-toolchain.tar.gz
          retention-days: 30

      - name: Upload test binary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-binary
          path: rust-fork/test_hello
          retention-days: 30

  build-musl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout musl-merlionos
        uses: actions/checkout@v4
        with:
          repository: MerlionOS/musl-merlionos
          path: musl-merlionos

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build musl
        run: |
          cd musl-merlionos
          ./build.sh 2>&1 | tail -20

      - name: Build examples
        run: |
          cd musl-merlionos/examples
          make CC=x86_64-linux-musl-gcc 2>&1 || \
          make CC=gcc 2>&1 || \
          echo "Examples build attempted (may need musl cross-compiler)"

      - name: Upload sysroot
        uses: actions/upload-artifact@v4
        with:
          name: merlionos-musl-sysroot
          path: musl-merlionos/sysroot/
          retention-days: 30
